services:
  mongodb:
    image: mongo:latest
    container_name: dresstyle-mongodb
    ports:
      - "27017:27017"
    networks:
      - dresstyle-network
    volumes:
      - mongo-data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dresstyle-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - dresstyle-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-server:
    build: ./services/discoveryserver
    container_name: dresstyle-discovery
    ports:
      - "8761:8761"
    networks:
      - dresstyle-network

  api-gateway:
    build: ./services/apigateway
    container_name: dresstyle-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      discovery-server:
        condition: service_started
    networks:
      - dresstyle-network

  auth-service:
    build: ./services/authservice
    container_name: dresstyle-auth
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/dresstyle_auth
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin123
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - ADMIN_NAME=admin
      - ADMIN_EMAIL=admin@admin.com
      - ADMIN_PASSWORD=admin
    depends_on:
      mongodb:
        condition: service_started
      discovery-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - dresstyle-network

  catalog-service:
    build: ./services/catalogservice
    container_name: dresstyle-catalog
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/dresstyle_catalog
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - dresstyle-network

  order-service:
    build: ./services/orderservice
    container_name: dresstyle-order
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/dresstyle_orders
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - dresstyle-network

  subscription-service:
    build: ./services/subscriptionservice
    container_name: dresstyle-subscription
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/dresstyle_subs
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - dresstyle-network

  notification-service:
    build: ./services/notificationservice
    container_name: dresstyle-notification
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      rabbitmq:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - dresstyle-network

  web-frontend:
    build: ./vue-project 
    container_name: dresstyle-frontend
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - dresstyle-network

networks:
  dresstyle-network:
    driver: bridge

volumes:
  mongo-data: