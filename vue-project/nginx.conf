server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Intenta servir la ruta como archivo, luego como carpeta, 
        # y si falla, devuelve el index.html para que Vue Router tome el mando.
        try_files $uri $uri/ /index.html;
    }

    # Redirigir errores al index.html
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}