# Configuración de rutas
spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
    discovery:
        locator:
          enabled: true
    routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
management:
    endpoints:
      web:
        exposure:
          include: "gateway,health,info"
    endpoint:
     gateway:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
