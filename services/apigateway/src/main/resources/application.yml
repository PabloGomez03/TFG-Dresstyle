# Configuración de rutas
spring:
security:
  user:
    name: admin
    password: admin
  main:
    web-application-type: reactive
  cloud:
    gateway:
    globalcors:
      cors-configurations:
        "[/**]":
          allowedOrigins: "http://localhost" # Si lanzo la aplicacion a producción, aqui debo de poner la url publica de la app
          allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: lb://authservice
          predicates:
            - Path=/ds/auth/**
          filters:
            - RewritePath=/ds/(?<segment>.*), /$\{segment}

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
